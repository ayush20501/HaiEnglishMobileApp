name: iOS Simulator Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobileappuiflutter

      - name: Build iOS Simulator
        run: flutter build ios --simulator --no-codesign
        working-directory: mobileappuiflutter

      - name: Package Simulator App
        run: |
          cd mobileappuiflutter/build/ios/iphonesimulator
          zip -r ../../../../app.zip Runner.app

      - name: Upload Simulator Zip
        uses: actions/upload-artifact@v4
        with:
          name: simulator-ios-app
          path: app.zip
