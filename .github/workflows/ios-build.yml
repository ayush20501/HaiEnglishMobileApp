name: iOS Unsigned Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobileappuiflutter

      - name: Build iOS
        run: flutter build ios --no-codesign --release
        working-directory: mobileappuiflutter

      - name: Package into IPA
        run: |
          mkdir Payload
          cp -r mobileappuiflutter/build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-app
          path: app.ipa
